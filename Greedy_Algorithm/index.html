<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vaktaplan Generator</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
    margin-top: 100px;
}

.container {
    background: white;
    padding: 40px;
    width: 400px;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

h1 {
    margin-bottom: 20px;
}

.drop-zone {
    border: 2px dashed #999;
    padding: 30px;
    cursor: pointer;
    margin-bottom: 20px;
}

.drop-zone:hover {
    border-color: orange;
}

button {
    padding: 12px 20px;
    border: none;
    background: #ff6e1b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #ff6e1b;
}

#download {
    margin-top: 20px;
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vaktaplan Þjónustufulltrúa</h1>

    <div class="drop-zone" id="drop">
        Drag & drop Excel file here<br>
        or click to select
    </div>

    <input type="file" id="fileInput" hidden>

    <button onclick="upload()">Generate Schedule</button>

    <div id="status"></div>

    <a id="download" href="#" download>
        <button>Download Excel</button>
    </a>
</div>

<script>
let selectedFile = null;

const drop = document.getElementById("drop");
const fileInput = document.getElementById("fileInput");
const status = document.getElementById("status");
const download = document.getElementById("download");

// click
drop.onclick = () => fileInput.click();

// file select
fileInput.onchange = () => {
    selectedFile = fileInput.files[0];
    drop.innerHTML = selectedFile.name;
};

// drag
drop.ondragover = (e) => {
    e.preventDefault();
    drop.style.borderColor = "orange";
};

drop.ondragleave = () => {
    drop.style.borderColor = "#999";
};

drop.ondrop = (e) => {
    e.preventDefault();
    selectedFile = e.dataTransfer.files[0];
    drop.innerHTML = selectedFile.name;
};

// upload
async function upload() {

    if (!selectedFile) {
        alert("Select file first");
        return;
    }

    status.innerHTML = "Running algorithm...";
    download.style.display = "none";

    const formData = new FormData();
    formData.append("file", selectedFile);

    const res = await fetch("/run", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    if (data.status === "success") {
        status.innerHTML = "Done ✅";

        download.href = data.download_url;
        download.style.display = "block";

    } else {
        status.innerHTML = "Error ❌";
        console.error(data);
    }
}
</script>

</body>
</html>
