<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <title>Vaktaplan</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            text-align: center;
            padding: 50px;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: inline-block;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        #result {
            margin-top: 20px;
        }

        a {
            color: blue;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📅 Búa til vaktaplan</h2>

    <input type="file" id="fileInput" accept=".xlsx">
    <br>

    <button onclick="upload()">Keyra vaktaplan</button>

    <div id="result"></div>
</div>

<script>
async function upload() {

    const fileInput = document.getElementById("fileInput");
    const resultDiv = document.getElementById("result");

    if (!fileInput.files.length) {
        resultDiv.innerHTML = "⚠️ Veldu Excel skrá";
        return;
    }

    const file = fileInput.files[0];

    const formData = new FormData();
    formData.append("file", file);

    resultDiv.innerHTML = "⏳ Keyri...";

    try {
        const response = await fetch("https://harpavaktaplan.onrender.com/run", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (data.status === "success") {

            const filename = data.output_file.split("/").pop();

            resultDiv.innerHTML = `
                ✅ Klárt!<br><br>
                <a href="https://harpavaktaplan.onrender.com/download/${filename}">
                    📥 Sækja vaktaplan
                </a>
            `;

        } else {
            resultDiv.innerHTML = "❌ Villa: " + data.message;
        }

    } catch (err) {
        resultDiv.innerHTML = "❌ Server error";
    }
}
</script>

</body>
</html>
